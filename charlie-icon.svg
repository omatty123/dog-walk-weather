<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">

  <!-- Background -->
  <rect width="256" height="256" rx="52" fill="#131315"/>

  <!-- ── EARS ── -->
  <ellipse cx="84"  cy="80" rx="34" ry="54" fill="#0e0a06" transform="rotate(-22 84 80)"/>
  <ellipse cx="172" cy="80" rx="34" ry="54" fill="#0e0a06" transform="rotate(22 172 80)"/>
  <!-- Ear inner (slightly lighter) -->
  <ellipse cx="84"  cy="84" rx="20" ry="36" fill="#1c1408" transform="rotate(-22 84 84)"/>
  <ellipse cx="172" cy="84" rx="20" ry="36" fill="#1c1408" transform="rotate(22 172 84)"/>

  <!-- ── HEAD (black base) ── -->
  <ellipse cx="128" cy="152" rx="92" ry="84" fill="#0e0a06"/>

  <!-- ── TAN CHEEK/BROW PATCHES ── -->
  <ellipse cx="90"  cy="154" rx="36" ry="30" fill="#a06820"/>
  <ellipse cx="166" cy="154" rx="36" ry="30" fill="#a06820"/>

  <!-- ── WHITE MUZZLE (upper) ── -->
  <ellipse cx="128" cy="170" rx="54" ry="42" fill="#f2ece0"/>

  <!-- ── MOUTH (open, dark interior) ── -->
  <path d="M 100,180 Q 128,215 156,180 Q 148,222 128,230 Q 108,222 100,180 Z" fill="#7a1825"/>

  <!-- ── TONGUE ── -->
  <ellipse cx="128" cy="210" rx="21" ry="17" fill="#e05878"/>
  <path d="M 128,196 L 128,224" stroke="#c0345a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── WHITE CHIN (below mouth, layered under tongue above) ── -->
  <ellipse cx="128" cy="222" rx="30" ry="13" fill="#f2ece0"/>

  <!-- Re-render tongue on top of chin -->
  <ellipse cx="128" cy="210" rx="21" ry="17" fill="#e05878"/>
  <path d="M 128,196 L 128,224" stroke="#c0345a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── EYES (sclera) ── -->
  <circle cx="102" cy="144" r="28" fill="white"/>
  <circle cx="154" cy="144" r="28" fill="white"/>

  <!-- ── PUPILS (large, expressive — Charlie's signature look) ── -->
  <circle cx="105" cy="147" r="21" fill="#0e0a06"/>
  <circle cx="157" cy="147" r="21" fill="#0e0a06"/>

  <!-- ── EYE GLEAM ── -->
  <circle cx="112" cy="137" r="7.5" fill="white"/>
  <circle cx="164" cy="137" r="7.5" fill="white"/>
  <circle cx="120" cy="152" r="3.5"  fill="white"/>
  <circle cx="172" cy="152" r="3.5"  fill="white"/>

  <!-- ── TAN BROW DOTS ── -->
  <ellipse cx="102" cy="118" rx="14" ry="8" fill="#a06820"/>
  <ellipse cx="154" cy="118" rx="14" ry="8" fill="#a06820"/>

  <!-- ── NOSE ── -->
  <ellipse cx="128" cy="163" rx="12" ry="8.5" fill="#0e0a06"/>
  <ellipse cx="124" cy="160" rx="4"  ry="2.5" fill="#3a2020" opacity="0.45"/>

</svg>
