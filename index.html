<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Walk Window — Appleton, WI</title>
  <link rel="icon" href="charlie.jpg" type="image/jpeg">
  <meta property="og:title" content="Dog Walk Window — Appleton, WI">
  <meta property="og:description" content="How early do you need to walk the dogs before it hits 73°F? Daily summer forecast for Appleton.">
  <meta property="og:image" content="https://omatty123.github.io/dog-walk-weather/charlie.jpg">
  <meta property="og:url" content="https://omatty123.github.io/dog-walk-weather/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://omatty123.github.io/dog-walk-weather/charlie.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #7ec8e3;
      --sky-lt: #d6eef8;
      --grass:  #e8f5ec;
      --white:  #ffffff;
      --text-1: #1a3828;
      --text-2: #5a7a68;
      --text-3: #a8c4b4;
      --shadow: rgba(26, 56, 40, 0.10);
      --red:    #ef4444;
      --yellow: #fbbf24;
      --green:  #22c55e;
    }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(175deg, var(--sky) 0%, var(--sky-lt) 28%, var(--grass) 100%);
      color: var(--text-1);
      padding-bottom: 72px;
    }

    header {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .header-icon {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 40%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      margin-top: 2px;
    }

    .header-text { flex: 1; min-width: 0; }

    .title-row {
      display: flex; align-items: baseline;
      gap: 8px; flex-wrap: wrap;
    }

    .title {
      font-size: 18px; font-weight: 800;
      letter-spacing: -0.01em; line-height: 1;
      color: var(--text-1); white-space: nowrap;
    }

    .subtitle {
      font-size: 16px; font-weight: 800;
      color: var(--text-2); white-space: nowrap;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 4px 16px;
    }

    .msg { padding: 40px 0; font-size: 15px; color: var(--text-2); font-weight: 500; }
    .msg.error { color: var(--red); }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 3px 16px var(--shadow);
      overflow: hidden;
      aspect-ratio: 1;
      animation: popIn 0.35s ease-out both;
    }
    .card:has(.hours-panel.open) { aspect-ratio: auto; }
    .red    { background: #fca5a5; }
    .yellow { background: #fde047; }
    .green  { background: #86efac; }

    .card-stripe { display: none; }

    .card-body {
      height: 100%;
      display: flex; flex-direction: column;
      justify-content: space-between;
      align-items: center; text-align: center;
      padding: 7px 8px 9px;
    }

    .card-meta {
      width: 100%; display: flex;
      align-items: center; justify-content: space-between;
    }

    .date-label {
      font-size: 17px; font-weight: 800;
      letter-spacing: 0.01em;
      color: var(--text-1);
    }

    .badge {
      font-size: 8px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      background: #fef3c7; color: #92400e;
      border: 1px solid #fde68a;
      padding: 1px 4px; border-radius: 20px;
    }

    .walk-time {
      font-weight: 800; letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--text-1);
      font-size: 11px;
    }
    .walk-time .time { font-size: 22px; display: block; }
    .green .walk-time { font-size: 26px; }

    .daily-high {
      font-size: 20px; font-weight: 800;
      color: var(--text-1);
    }

    .card-actions { display: flex; align-items: center; justify-content: center; gap: 10px; }

    .card-toggle {
      background: none; border: none;
      border-bottom: 1px solid rgba(0,0,0,0.25);
      padding: 0 0 1px;
      font-family: inherit; font-size: 9px; font-weight: 700;
      color: rgba(0,0,0,0.55); cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .card-toggle:hover { color: rgba(0,0,0,0.85); border-color: rgba(0,0,0,0.5); }

    .forecast-link {
      font-size: 9px; font-weight: 700;
      color: rgba(0,0,0,0.55); text-decoration: none;
      border-bottom: 1px solid rgba(0,0,0,0.25); padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .forecast-link:hover { color: rgba(0,0,0,0.85); border-color: rgba(0,0,0,0.5); }

    /* Hourly panel */
    .hours-panel { display: none; margin-top: 12px; border-top: 1px solid #e4ede8; padding-top: 8px; }
    .hours-panel.open { display: block; }

    .hours-section-label {
      font-size: 9px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-3); padding: 4px 6px 2px;
    }
    .hours-section-label a {
      color: inherit; text-decoration: underline;
      text-decoration-color: var(--text-3);
      text-underline-offset: 2px;
    }
    .hours-section-label a:hover { color: var(--text-2); }

    .src-link {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-3); text-decoration: none;
      border-bottom: 1px dotted var(--text-3);
    }
    .src-link:hover { color: var(--text-2); }
    .hours-section-label + .hours-section-label,
    .hours-divider { height: 1px; background: #e4ede8; margin: 4px 0; }

    .hour-row {
      display: flex; align-items: center; gap: 8px;
      padding: 2px 6px; border-radius: 5px;
      font-size: 12px; font-weight: 600; color: var(--text-2);
    }
    .hour-time { min-width: 68px; }
    .hour-temp { color: var(--text-1); }

    .hour-marker {
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.03em;
      padding: 1px 7px; border-radius: 10px; margin-left: auto;
    }

    .red    .hour-row.crossing { background: #fee2e2; }
    .red    .hour-row.crossing .hour-temp   { color: var(--red); }
    .red    .hour-row.crossing .hour-marker { background: var(--red);    color: #fff; }

    .yellow .hour-row.crossing { background: #fef9c3; }
    .yellow .hour-row.crossing .hour-temp   { color: #92400e; }
    .yellow .hour-row.crossing .hour-marker { background: var(--yellow); color: #1c1917; }

    .green  .hour-row.crossing { background: #dcfce7; }
    .green  .hour-row.crossing .hour-temp   { color: #15803d; }
    .green  .hour-row.crossing .hour-marker { background: var(--green);  color: #fff; }

    footer {
      max-width: 480px; margin: 16px auto 0;
      padding: 0 16px; font-size: 11px;
      color: var(--text-3); font-weight: 600;
    }

    @media (min-width: 480px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
      header, main, footer { max-width: 560px; }
    }
    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(5, 1fr); }
      header, main, footer { max-width: 680px; }
    }

    /* Location search bar */
    .loc-form { display: flex; gap: 5px; margin-top: 7px; }
    .loc-input {
      font-family: inherit; font-size: 12px; font-weight: 600;
      width: 110px; padding: 4px 8px;
      border: 2px solid #d1e8da; border-radius: 7px;
      background: white; color: var(--text-1); outline: none;
    }
    .loc-input:focus { border-color: #6ee7b7; }
    .loc-go, .loc-gps {
      font-family: inherit; font-size: 11px; font-weight: 800;
      padding: 4px 10px; border: none; border-radius: 7px;
      background: var(--text-1); color: white; cursor: pointer;
    }
    .loc-go:hover, .loc-gps:hover { opacity: 0.82; }
    .loc-gps { padding: 4px 8px; font-size: 14px; line-height: 1; }
  </style>
</head>
<body>
  <header>
    <img src="charlie.jpg" alt="Charlie" class="header-icon">
    <div class="header-text">
      <div class="title-row">
        <span class="title">Dog Walk Window</span>
        <span class="subtitle" id="subtitle">Loading&hellip;</span>
      </div>
      <form class="loc-form" id="loc-form" onsubmit="handleSearch(event)">
        <input class="loc-input" id="loc-input" type="text" placeholder="ZIP or city" autocomplete="off">
        <button class="loc-go" type="submit">Go</button>
        <button class="loc-gps" type="button" onclick="geolocate()" title="Use my location">&#x25CE;</button>
      </form>
    </div>
  </header>

  <main>
    <div id="content"><div class="msg">Loading forecast&hellip;</div></div>
  </main>

  <footer id="footer">
    US locations only &bull; NWS forecast + airport observations &bull; Refreshes on load
  </footer>

  <script>
    const NWS_HEADERS   = { 'User-Agent': 'DogWalkWindow (omatty@gmail.com)' };
    const NOM_HEADERS   = { 'User-Agent': 'DogWalkWindow/1.0 (omatty@gmail.com)' };
    const THRESHOLD     = 73;
    const DEFAULT_QUERY = '54911';
    const STORE_KEY     = 'dogwalk-v2-location'; // new key clears stale data
    let TZ          = 'America/Chicago';
    let nwsPage     = '';
    let stationPage = '';
    let wuZip       = '';

    function toLocal(ts) {
      const d    = new Date(ts);
      const date = d.toLocaleDateString('en-CA', { timeZone: TZ });
      const hr   = parseInt(
        Intl.DateTimeFormat('en-US', { hour: 'numeric', hour12: false, timeZone: TZ }).format(d), 10
      );
      return { date, hour: hr === 24 ? 0 : hr };
    }

    async function handleSearch(e) {
      e.preventDefault();
      const q = document.getElementById('loc-input').value.trim();
      if (!q) return;
      localStorage.setItem(STORE_KEY, q);
      await loadQuery(q);
    }

    function geolocate() {
      if (!navigator.geolocation) return;
      document.getElementById('content').innerHTML = '<div class="msg">Detecting your location&hellip;</div>';
      navigator.geolocation.getCurrentPosition(
        async pos => {
          try {
            const { latitude: lat, longitude: lon } = pos.coords;
            const r = await fetch(
              `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`,
              { headers: NOM_HEADERS }
            );
            const d    = await r.json();
            const addr = d.address;
            const city = addr.city || addr.town || addr.village || addr.hamlet || 'Your Location';
            const st   = addr.state_code || addr['ISO3166-2-lvl4']?.split('-')[1] || '';
            const q    = `${city}, ${st}`;
            localStorage.setItem(STORE_KEY, q);
            document.getElementById('loc-input').value = q;
            await loadQuery(q);
          } catch {
            loadQuery(DEFAULT_QUERY);
          }
        },
        () => loadQuery(DEFAULT_QUERY),
        { timeout: 8000 }
      );
    }

    async function geocode(query) {
      if (/^\d{5}$/.test(query)) {
        // ZIP code path
        const r = await fetch(`https://api.zippopotam.us/us/${query}`);
        if (!r.ok) throw new Error('ZIP code not found.');
        const d = await r.json();
        return {
          lat:  parseFloat(d.places[0].latitude).toFixed(4),
          lon:  parseFloat(d.places[0].longitude).toFixed(4),
          city: d.places[0]['place name'],
          st:   d.places[0]['state abbreviation'],
          zip:  query
        };
      } else {
        // City name path via Nominatim
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&countrycodes=us&format=json&limit=1&addressdetails=1`;
        const r = await fetch(url, { headers: NOM_HEADERS });
        if (!r.ok) throw new Error('Could not search for that location.');
        const results = await r.json();
        if (!results.length) throw new Error(`No US location found for "${query}".`);
        const place = results[0];
        const addr  = place.address;
        const city  = addr.city || addr.town || addr.village || addr.hamlet || query;
        const st    = addr.state_code || addr['ISO3166-2-lvl4']?.split('-')[1] || '';
        return {
          lat:  parseFloat(place.lat).toFixed(4),
          lon:  parseFloat(place.lon).toFixed(4),
          city,
          st,
          zip:  null
        };
      }
    }

    async function loadQuery(query) {
      document.getElementById('content').innerHTML = '<div class="msg">Loading forecast&hellip;</div>';
      try {
        const { lat, lon, city, st, zip } = await geocode(query);

        document.getElementById('subtitle').innerHTML = `${city}, ${st}`;
        document.getElementById('footer').innerHTML   =
          `${city}, ${st} &bull; NWS forecast + nearby station &bull; Refreshes on load`;
        wuZip = zip || query;

        const pRes = await fetch(
          `https://api.weather.gov/points/${lat},${lon}`, { headers: NWS_HEADERS });
        if (!pRes.ok) throw new Error('NWS doesn\'t cover this location. Try a nearby city or ZIP.');
        const pData = await pRes.json();

        TZ      = pData.properties.timeZone;
        nwsPage = `https://forecast.weather.gov/MapClick.php?CityName=${encodeURIComponent(city)}&state=${st}&textField1=${lat}&textField2=${lon}`;

        const hourlyUrl   = pData.properties.forecastHourly;
        const dailyUrl    = hourlyUrl.replace('/forecast/hourly', '/forecast');
        const stationsUrl = pData.properties.observationStations;

        const stRes     = await fetch(stationsUrl, { headers: NWS_HEADERS });
        const stData    = stRes.ok ? await stRes.json() : { features: [] };
        const stationId = stData.features[0]?.properties?.stationIdentifier ?? null;
        stationPage     = stationId ? `https://www.wunderground.com/airport/${stationId}` : nwsPage;
        const obsUrl    = stationId
          ? `https://api.weather.gov/stations/${stationId}/observations?limit=30`
          : null;

        const fetches = [
          fetch(hourlyUrl, { headers: NWS_HEADERS }),
          fetch(dailyUrl,  { headers: NWS_HEADERS }),
          ...(obsUrl ? [fetch(obsUrl, { headers: NWS_HEADERS })] : [])
        ];
        const [hRes, dRes, obsRes] = await Promise.all(fetches);
        if (!hRes.ok) throw new Error(`NWS hourly: ${hRes.status}`);
        if (!dRes.ok) throw new Error(`NWS daily: ${dRes.status}`);
        const obsData = obsRes ? await obsRes.json() : { features: [] };

        render(await hRes.json(), await dRes.json(), obsData);
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="msg error">${err.message}</div>`;
      }
    }

    function render(hourlyData, dailyData, obsData) {
      const byDate = {};

      hourlyData.properties.periods.forEach(p => {
        const { date, hour } = toLocal(p.startTime);
        (byDate[date] = byDate[date] || {})[hour] = { temp: p.temperature, src: 'forecast' };
      });

      obsData.features.forEach(f => {
        const tc = f.properties?.temperature?.value;
        if (tc == null) return;
        const tf = Math.round(tc * 9 / 5 + 32);
        const { date, hour } = toLocal(f.properties.timestamp);
        if (!byDate[date]) byDate[date] = {};
        byDate[date][hour] = { temp: tf, src: 'observed' };
      });

      const dailyHigh = {};
      dailyData.properties.periods.forEach(p => {
        if (!p.isDaytime) return;
        const { date } = toLocal(p.startTime);
        dailyHigh[date] = p.temperature;
      });

      const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
      const year     = todayStr.slice(0, 4);

      const cards = Object.keys(byDate)
        .sort()
        .filter(d => d >= todayStr && d <= `${year}-08-31`)
        .map((date, idx) => {
          const hours = Object.keys(byDate[date])
            .map(Number).sort((a, b) => a - b)
            .map(h => ({ hour: h, temp: byDate[date][h].temp, src: byDate[date][h].src }));
          const crossing = morningCrossing(hours);
          return { date, hours, crossing, high: dailyHigh[date] ?? null, isToday: date === todayStr, idx };
        });

      if (!cards.length) {
        document.getElementById('content').innerHTML =
          '<div class="msg">No summer forecast data yet.</div>';
        return;
      }

      document.getElementById('content').innerHTML =
        `<div class="grid">${cards.map(cardHTML).join('')}</div>`;
    }

    function morningCrossing(hours) {
      if (!hours.length) return null;
      let minIdx = 0;
      for (let i = 1; i < hours.length; i++) {
        if (hours[i].temp < hours[minIdx].temp) minIdx = i;
      }
      for (let i = minIdx; i < hours.length; i++) {
        if (hours[i].temp >= THRESHOLD) return hours[i];
      }
      return null;
    }

    function cardInfo(crossing) {
      if (crossing && crossing.hour <= 9)
        return { cls: 'red',    label: `GET OUT BY<br><span class="time">${fmtHour(crossing.hour).replace(' AM', '')}</span>` };
      if (crossing && crossing.hour < 11)
        return { cls: 'yellow', label: `GET OUT BY<br><span class="time">${fmtHour(crossing.hour).replace(' AM', '')}</span>` };
      return { cls: 'green', label: 'OK!' };
    }

    function fmtHour(h) {
      if (h === 0)  return '12:00 AM';
      if (h < 12)   return `${h}:00 AM`;
      if (h === 12) return '12:00 PM';
      return `${h - 12}:00 PM`;
    }

    function fmtDate(dateStr) {
      const d   = new Date(dateStr + 'T12:00:00');
      const day = d.toLocaleDateString('en-US', { weekday: 'short', timeZone: TZ }).toUpperCase();
      const num = d.toLocaleDateString('en-US', { day: 'numeric', timeZone: TZ });
      return `${day} ${num}`;
    }

    function toggleHours(date) {
      const panel = document.querySelector(`[data-date="${date}"] .hours-panel`);
      const btn   = document.querySelector(`[data-date="${date}"] .card-toggle`);
      const open  = panel.classList.toggle('open');
      btn.textContent = open ? 'hide' : 'by hour';
    }

    function cardHTML({ date, hours, crossing, high, isToday, idx }) {
      const { cls, label } = cardInfo(crossing);
      const badge   = isToday ? '<span class="badge">Today</span>' : '';
      const highTxt = high != null ? `<div class="daily-high">${high}&deg;</div>` : '';
      const wuUrl   = `https://www.wunderground.com/forecast/us/${wuZip}`;

      let lastSrc = null;
      const rows = hours.map(({ hour, temp, src }) => {
        const hit = crossing && hour === crossing.hour;
        let header = '';
        if (src !== lastSrc) {
          if (lastSrc !== null) header += '<div class="hours-divider"></div>';
          const srcUrl   = src === 'observed' ? stationPage : nwsPage;
          const srcLabel = src === 'observed' ? 'Observed (nearest station)' : 'Forecast (NWS)';
          header += `<div class="hours-section-label"><a href="${srcUrl}" target="_blank" rel="noopener">${srcLabel}</a></div>`;
          lastSrc = src;
        }
        return header + `<div class="hour-row${hit ? ' crossing' : ''}">
          <span class="hour-time">${fmtHour(hour)}</span>
          <span class="hour-temp">${temp}&deg;F</span>
          ${hit ? '<span class="hour-marker">73&deg;</span>' : ''}
        </div>`;
      }).join('');

      return `
        <div class="card ${cls}${isToday ? ' today' : ''}" data-date="${date}" style="animation-delay:${idx * 45}ms">
          <div class="card-stripe"></div>
          <div class="card-body">
            <div class="card-meta">
              <span class="date-label">${fmtDate(date)}</span>
              ${badge}
            </div>
            <div class="walk-time">${label}</div>
            ${highTxt}
            <div class="card-actions">
              <button class="card-toggle" onclick="toggleHours('${date}')">by hour</button>
              <a class="forecast-link" href="${wuUrl}" target="_blank" rel="noopener">WU</a>
            </div>
            <div class="hours-panel">${rows}</div>
          </div>
        </div>`;
    }

    // Boot — default Appleton, override with saved query
    // Boot: saved location → geolocation (first visit only) → Appleton default
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) {
      document.getElementById('loc-input').value = saved;
      loadQuery(saved);
    } else {
      // First visit: try geolocation, fall back to Appleton
      if (navigator.geolocation) {
        document.getElementById('content').innerHTML = '<div class="msg">Detecting your location&hellip;</div>';
        navigator.geolocation.getCurrentPosition(
          async pos => {
            try {
              const { latitude: lat, longitude: lon } = pos.coords;
              const r = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`,
                { headers: NOM_HEADERS }
              );
              const d    = await r.json();
              const addr = d.address;
              const city = addr.city || addr.town || addr.village || addr.hamlet || 'Your Location';
              const st   = addr.state_code || addr['ISO3166-2-lvl4']?.split('-')[1] || '';
              const q    = `${city}, ${st}`;
              localStorage.setItem(STORE_KEY, q);
              document.getElementById('loc-input').value = q;
              loadQuery(q);
            } catch { loadQuery(DEFAULT_QUERY); }
          },
          () => loadQuery(DEFAULT_QUERY),
          { timeout: 8000 }
        );
      } else {
        loadQuery(DEFAULT_QUERY);
      }
    }
  </script>
</body>
</html>
